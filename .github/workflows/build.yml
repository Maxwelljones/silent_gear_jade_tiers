name: Build Jade Tiers Addon for Silentgear

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14

      - name: Show project files before build
        run: |
          pwd
          ls -la
          find . -maxdepth 8 -type f | sort

      - name: Build addon
        run: |
          set -o pipefail
          gradle clean jar --no-daemon --stacktrace --info 2>&1 | tee gradle-build.log

      - name: Show build outputs
        if: always()
        run: |
          echo "=== All jar files ==="
          find . -type f -name "*.jar" -print
          echo "=== All build outputs ==="
          find . -path "*/build/*" -type f -print

      - name: Prepare artifacts
        if: success()
        run: |
          mkdir -p artifacts
          find . -type f -path "*/build/libs/*.jar" -exec cp {} artifacts/ \;
          echo "=== Artifact folder ==="
          ls -la artifacts
          test -n "$(find artifacts -type f -name '*.jar' -print -quit)" || (echo "No jar produced"; exit 1)

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jade-tiers-addon-for-silentgear
          path: artifacts/*.jar
          if-no-files-found: error
